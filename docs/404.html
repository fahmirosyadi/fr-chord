<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
      // Preserve the path after /fr-chord/
      const base = '/fr-chord/';
      const path = window.location.pathname.replace(base, '');
      window.location.href = base + '#' + path + window.location.search + window.location.hash;
    </script>
  </head>
  <body></body>
</html>
