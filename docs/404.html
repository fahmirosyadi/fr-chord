<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script type="text/javascript">
      // Redirect all 404s to index.html, preserving path
      var path = window.location.pathname;
      window.location.href = '/fr-chord/index.html' + path.replace('/fr-chord', '');
    </script>
  </head>
  <body></body>
</html>
