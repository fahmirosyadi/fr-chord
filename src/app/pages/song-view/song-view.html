<div
  class=""
  (swipeleft)="nextPart()"
  (swiperight)="prevPart()">
  <div class="grid lg-grid-cols-3 gap-3">
    <div class="grid grid-cols-4 gap-2" style="width: 300px;">
      <button mat-raised-button (click)="song.transpose(-1)">-</button>
      <button mat-raised-button disabled="">{{song.tmpCurrentKey}}</button>
      <button mat-raised-button (click)="song.transpose(1)">+</button>
      <button mat-raised-button disabled="">{{song.getTransposeValue()}}</button>
    </div>

      <app-song-preview [song]="song"></app-song-preview>
