<div
  class=""
  (swipeleft)="nextPart()"
  (swiperight)="prevPart()">
  <div class="grid lg-grid-cols-3 gap-3">
		<mat-card class="col-span-1 lg-col-span-2">
      <div class="grid grid-cols-5">
        <div class="col-span-4">
          <div class="song-header">

            <button mat-icon-button (click)="prevPart()">
              <mat-icon>chevron_left</mat-icon>
            </button>

            <h2>{{ song.parts[currentIndex]?.label() }}</h2>

            <button mat-icon-button (click)="nextPart()">
              <mat-icon>chevron_right</mat-icon>
            </button>

          </div>

          @for (i of [currentIndex]; track i) {

            @if (song.parts[i]) {
              <div class="song-body">
                <div class="preview">
                  <app-part-preview [part]="song.parts[i]" [showTitle]="false"></app-part-preview>
                </div>
              </div>

              @if (i === currentIndex) {
                <hr>
              }
            }

          }
        </div>
        <div>
          <div class="justify-self-end">
            <div class="grid gap-2 mb-5" style="width: 100px;">
              <button mat-raised-button (click)="song.transpose(1)">+</button>
              <button mat-raised-button disabled>{{song.key}}</button>
              <button mat-raised-button (click)="song.transpose(-1)">-</button>
            </div>
          </div>
        </div>
      </div>
		</mat-card>
		<mat-card class="nav-desktop col-span-1 flex flex-col items-center">
      <div class="song-controls hidden grid grid-cols-3 gap-3">
        @for (part of song.parts; track $index) {
          <button
            mat-stroked-button
            (click)="selectPart($index)"
            [class.active]="$index === currentIndex">

            {{ part.label() }}

          </button>
        }
      </div>
		</mat-card>
    <div class="nav-mobile">
      <div class="grid grid-cols-2 gap-2">
        <button
          mat-stroked-button
          (click)="prevPart()">

          <mat-icon>chevron_left</mat-icon>
        </button>
        <button
          mat-stroked-button
          (click)="nextPart()">

          <mat-icon>chevron_right</mat-icon>
        </button>
      </div>
    </div>
  </div>
</div>
