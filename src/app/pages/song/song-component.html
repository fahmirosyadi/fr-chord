<div class="page">

	<div class="header">
		<h2>Song Management</h2>

		<button
			mat-flat-button
			color="primary"
			(click)="addSong()">

			<mat-icon>add</mat-icon>
			Add Song
		</button>
	</div>

	<app-data-table
		[columns]="columns"
		[data]="data"
		[showActions]="true"
    (search)="onSearch($event)"
		(edit)="editSong($event)"
		(view)="viewSong($event)">
	</app-data-table>

	<mat-paginator
		[length]="total"
		[pageSize]="pageSize"
		[pageIndex]="pageIndex"
		[pageSizeOptions]="[5, 10, 25, 50]"
		(page)="onPageChange($event)">
	</mat-paginator>

</div>
