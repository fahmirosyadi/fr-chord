<div class="page">

  <div class="header">
    <h2>Song Management</h2>

    <button mat-flat-button color="primary" (click)="addSong()">
      <mat-icon>add</mat-icon>
      Add Song
    </button>
  </div>

  <app-data-table
    [columns]="columns"
    [data]="data"
    [showActions]="true"
    (edit)="editSong($event)"
    (view)="viewSong($event)">
  </app-data-table>

</div>
